# Reference DOSBox / DOSBox Staging conf for local testing.
# tools/run.sh writes config/dosbox.local.conf with an absolute mount path.

[sdl]
fullscreen = false

[dosbox]
memsize = 16
machine = svga_s3

[cpu]
core = auto
cputype = auto
cpu_cycles = max
cpu_cycles_protected = max
cpu_throttle = false

[dos]
xms = true
ems = true
umb = true
ver = 6.22

[autoexec]
@echo off
REM mount C is filled in by tools/run.sh
REM mount C /path/to/dos-game-browser/booth
C:
cls
if exist UTILS\ABORT.COM UTILS\ABORT.COM
:loop
BROWSER.COM
goto loop
